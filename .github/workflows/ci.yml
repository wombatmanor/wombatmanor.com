name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install markdownlint-cli==0.35.0 codespell
      - name: Lint markdown
        run: markdownlint "**/*.md"
      - name: Spell check
        run: codespell -q 3 -L wombatmanor
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install npm deps (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi
      - name: Run tests (placeholder)
        run: |
          echo "No tests defined yet"
